<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Flexible Menu Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <!--[if lt IE 9]><script src="js/html5shiv-printshiv.js" media="all"></script><![endif]-->
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="flexmenu.js" type="module"></script>
    <script src="index.js"></script>
</head>
<body>
    <template id="home">
        <h3>Welcome to the Flexible Menu Demo!</h3>
        <p>This is the home page. Use the menu to navigate.</p>
    </template>
    <template id="about">
        <h3>About the Flexible Menu</h3>
        <p>This is the about page. Learn more about the flexible menu.</p>
    </template>
    <template id="getting-started">
        <h3>Getting Started</h3>
        <p>
            Let's begin with a classic example of the flexible menu, to demonstrate its capabilities by
            outlining the navigation structure of the documentation for the flexible menu itself. 
            The documentation is organized into several sections, each dedicated to a specific component of 
            the flexible menu. You can navigate through these sections using the menu items below.
        </p>
        <p>
            Here's a typical structure showing flex-menu as the main component, with color-label, menu-item, 
            menu-list, main-menu, and hamburger-button as its subcomponents. 
            Each of these components has its own documentation section that you can access through the menu.
            <br />
            <pre style="background-color: lightgray;"><code>
                &lt;flex-menu&gt;
                    &lt;menu-item&gt;
                        Home
                    &lt;/menu-item&gt;
                    &lt;menu-list menu-title="Documentation"&gt;
                        &lt;menu-item href="#getting-started"&gt;Getting Started&lt;/menu-item&gt;
                        &lt;menu-separator&gt;&lt;/menu-separator&gt;
                        &lt;menu-item href="#color-label"&gt;Color Label&lt;/menu-item&gt;
                        &lt;menu-item href="#menu-item"&gt;Menu Item&lt;/menu-item&gt;
                        &lt;menu-item href="#menu-list"&gt;Menu List&lt;/menu-item&gt;
                        &lt;menu-item href="#main-menu"&gt;Main Menu&lt;/menu-item&gt;
                        &lt;menu-item href="#hamburger-button"&gt;Hamburger Button&lt;/menu-item&gt;
                    &lt;/menu-list&gt;
                    &lt;menu-item href="#configuration"&gt;Configuration&lt;/menu-item&gt;
                    &lt;menu-item href="#about"&gt;About&lt;/menu-item&gt;
                &lt;/flex-menu&gt;
            </code></pre>
        </p>
        <p>
            The previous html code snippet illustrates how to structure the flexible menu with its various components. 
            Each menu item corresponds to a section in the documentation, allowing you to easily navigate and learn
        </p>
    </template>
    <template id="flex-menu">
        <h3>Flex Menu Documentation</h3>
        <p>This section provides documentation for the flex menu component.</p>
    </template>
    <template id="color-label">
        <h3>Color Label Documentation</h3>
        <p>This section provides documentation for the color label component.</p>
    </template>
    <template id="menu-item">
        <h3>Menu Item Documentation</h3>
        <p>This section provides documentation for the menu item component.</p>
    </template>
    <template id="menu-list">
        <h3>Menu List Documentation</h3>
        <p>This section provides documentation for the menu list component.</p>
    </template>
    <template id="main-menu">
        <h3>Main Menu Documentation</h3>
        <p>This section provides documentation for the main menu component.</p>
    </template>
    <template id="hamburger-button">
        <h3>Hamburger Button Documentation</h3>
        <p>This section provides documentation for the hamburger button component.</p>
    </template>

    <template id="configuration">
        <h3 style="padding: 2rem; color: red;">
            You can choose here colours for various elements of the screen.
        </h3>
        <div class="pagina">
            <div  class="renglon">
                <label for="cbo-menu-text-colour">Menu text colour</label>
                <select id="cbo-menu-text-colour">
                    <button><selectedcontent></selectedcontent></button>
                </select>
            </div>

            <div  class="renglon">
                <label for="cbo-header-footer-background">Menu background colour</label>
                <select id="cbo-header-footer-background">
                    <button><selectedcontent></selectedcontent></button>
                </select>
            </div>

            <div  class="renglon">
                <label for="cbo-menu-background-colour">Menu selected  background colour</label>
                <select id="cbo-menu-background-colour">
                    <button><selectedcontent></selectedcontent></button>
                </select>
            </div>

            <!-- <div class="renglon">
                <label for="cbo-selected-item">Selected item colour</label>
                <select id="cbo-selected-item">
                    <button><selectedcontent></selectedcontent></button>
                </select>
            </div> -->

            <div style="text-align: center; margin-bottom: 0.5rem;">
                <button onclick="reset_colours();" class="bgbutton">Reset all colours to default values</button>
            </div>
        </div>
    </template>

    <flex-menu id="test-elem" bg-color="seagreen">
        <color-label>
            <img src="favicon.ico" alt="Favicon" />
            <span style="color: lightgreen">&nbsp;Flexible Menu</span>
        </color-label> 
        <!-- <div style="color: white; padding-left: 10px; padding-right: 10px; text-align: center;">Viva River!</div> -->
        <menu-item href="#home">Home</menu-item>
        <menu-list menu-title="Docs">
            <menu-item href="#getting-started">Getting Started</menu-item>
            <menu-separator></menu-separator>
            <menu-item href="#color-label">Color Label </menu-item>
            <menu-item href="#menu-item">Menu Item </menu-item>
            <menu-item href="#menu-list">Menu List </menu-item>
            <menu-item href="#main-menu">Main Menu </menu-item>
            <menu-item href="#hamburger-button">Hamburger Button </menu-item>
            <menu-item href="#flex-menu">Flexible Menu</menu-item>
            <menu-separator></menu-separator>
            <menu-item href="#all">All docs together</menu-item>
        </menu-list>
        <menu-item href="#configuration">Configuration</menu-item>
        <menu-item href="#about">About</menu-item>   
    </flex-menu>
    <div class="main">
        <h2 class="title-header">Flexible Menu Test</h2>
        <hr />
    </div>
</body>
</html>
